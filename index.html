<!DOCTYPE html>
<html>
<head>
  <title>Team Task Manager</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #eef2f7;
    }

    header {
      background: linear-gradient(to right, #4facfe, #00f2fe);
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .container {
      display: flex;
      gap: 20px;
      padding: 20px;
      flex-wrap: wrap;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      margin-bottom: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: #4facfe;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #3b8de3;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      background: #f4f6f8;
      padding: 10px;
      margin-top: 8px;
      border-radius: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .delete-btn {
      background: red;
      padding: 5px 10px;
      border-radius: 4px;
      font-size: 12px;
    }

    .delete-btn:hover {
      background: darkred;
    }

    .status {
      font-size: 12px;
      padding: 3px 6px;
      border-radius: 4px;
    }

    .pending {
      background: #ffeaa7;
    }

    .completed {
      background: #55efc4;
    }

    #dashboard {
      display: none;
    }

    .auth-box {
      width: 300px;
      margin: 100px auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
  </style>
</head>

<body>

<header>🚀 Team Task Manager</header>

<!-- AUTH -->
<div id="authPage" class="auth-box">
  <h2>Login / Signup</h2>
  <input id="username" placeholder="Username" />
  <input id="password" type="password" placeholder="Password" />
  <button onclick="signup()">Signup</button>
  <button onclick="login()">Login</button>
  <p id="msg"></p>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="container">

    <div class="card">
      <h3>Create Project</h3>
      <input id="projectName" placeholder="Project Name" />
      <button onclick="createProject()">Create</button>
    </div>

    <div class="card">
      <h3>Create Task</h3>
      <input id="taskTitle" placeholder="Task Title" />
      <input id="projectId" placeholder="Project ID" />
      <button onclick="createTask()">Add Task</button>
    </div>

    <div class="card">
      <h3>Projects</h3>
      <ul id="projects"></ul>
    </div>

    <div class="card">
      <h3>Tasks</h3>
      <ul id="tasks"></ul>
    </div>

  </div>
</div>

<script>


function showDashboard() {
  document.getElementById("authPage").style.display = "none";
  document.getElementById("dashboard").style.display = "block";
  loadProjects();
  loadTasks();
}

// SIGNUP
async function signup() {
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  await fetch("/signup", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ username, password })
  });

  document.getElementById("msg").innerText = "Signup successful!";
}

// LOGIN
async function login() {
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  const res = await fetch("/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ username, password })
  });

  const data = await res.json();

  if (data.success) {
    showDashboard();
  } else {
    document.getElementById("msg").innerText = "Invalid credentials";
  }
}

// CREATE PROJECT
async function createProject() {
  const name = document.getElementById("projectName").value;

  await fetch("/projects", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ name })
  });

  loadProjects();
}

// CREATE TASK
async function createTask() {
  const title = document.getElementById("taskTitle").value;
  const project_id = document.getElementById("projectId").value;

  await fetch("/tasks", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ title, project_id })
  });

  loadTasks();
}

// DELETE TASK
async function deleteTask(id) {
  await fetch(`/tasks/${id}`, { method: "DELETE" });
  loadTasks();
}

// DELETE PROJECT
async function deleteProject(id) {
  await fetch(`/projects/${id}`, { method: "DELETE" });
  loadProjects();
}

// LOAD PROJECTS
async function loadProjects() {
  const res = await fetch("/projects");
  const data = await res.json();

  document.getElementById("projects").innerHTML =
    data.map(p => `
      <li>
        ${p.id} - ${p.name}
        <button class="delete-btn" onclick="deleteProject(${p.id})">Delete</button>
      </li>
    `).join("");
}

// LOAD TASKS
async function loadTasks() {
  const res = await fetch("/tasks");
  const data = await res.json();

  document.getElementById("tasks").innerHTML =
    data.map(t => `
      <li>
        ${t.title}
        <span class="status ${t.status}">${t.status}</span>
        <button class="delete-btn" onclick="deleteTask(${t.id})">Delete</button>
      </li>
    `).join("");
}

</script>

</body>
</html>
